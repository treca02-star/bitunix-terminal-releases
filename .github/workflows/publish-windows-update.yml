name: Publish Windows update

on:
  push:
    branches:
      - main
    paths:
      - "payload/**"
      - ".github/workflows/publish-windows-update.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      RELEASE_TAG: v0.4.0-beta.2
    steps:
      - name: Checkout compiled update payload
        uses: actions/checkout@v4

      - name: Restore compiled payload
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP "bitunix-terminal-beta2.tar.gz"
          $stream = [System.IO.File]::Create($archive)
          try {
            Get-ChildItem payload -Filter "bitunix-terminal-beta2.tar.gz.part-*" | Sort-Object Name | ForEach-Object {
              $bytes = [System.IO.File]::ReadAllBytes($_.FullName)
              $stream.Write($bytes, 0, $bytes.Length)
            }
          } finally {
            $stream.Dispose()
          }
          tar -xzf $archive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked packaging dependencies
        run: npm ci

      - name: Validate compiled payload
        shell: pwsh
        run: |
          $required = @("dist/index.html", "dist-electron/electron/main.js", "electron/preload.cjs", "build/installer.nsh")
          foreach ($path in $required) { if (-not (Test-Path $path)) { throw "Missing compiled update file: $path" } }
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if ("v$version" -ne $env:RELEASE_TAG) { throw "Tag $env:RELEASE_TAG does not match package version $version" }

      - name: Build unsigned Windows NSIS update
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win nsis --publish never

      - name: Generate SHA-256 evidence
        shell: pwsh
        run: |
          $installer = Get-ChildItem release -Filter "*.exe" -File | Where-Object { $_.Name -like "*Setup*" } | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not produced." }
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content release/SHA256SUMS.txt -Encoding ascii

      - name: Publish updater release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = Get-ChildItem release -File | Where-Object { $_.Extension -in ".exe", ".blockmap", ".txt" -or $_.Name -eq "latest.yml" } | ForEach-Object { $_.FullName }
          if (-not $assets) { throw "Updater assets are missing." }
          $notes = "Встроенное обновление Bitunix Terminal 0.4.0-beta.2. Устанавливается поверх beta.1 без удаления приложения и настроек."
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            $existingAssets = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$env:RELEASE_TAG" --jq ".assets[].name"
            foreach ($assetName in $existingAssets) {
              gh release delete-asset $env:RELEASE_TAG $assetName --repo $env:GITHUB_REPOSITORY --yes
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }
            gh release upload $env:RELEASE_TAG $assets --repo $env:GITHUB_REPOSITORY --clobber
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            gh release edit $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --title "Bitunix Terminal 0.4.0-beta.2" --prerelease --notes $notes
          } else {
            gh release create $env:RELEASE_TAG $assets --repo $env:GITHUB_REPOSITORY --target $env:GITHUB_SHA --title "Bitunix Terminal 0.4.0-beta.2" --prerelease --notes $notes
          }

      - name: Preserve release evidence
        uses: actions/upload-artifact@v4
        with:
          name: bitunix-terminal-${{ env.RELEASE_TAG }}-updater
          path: |
            release/*.exe
            release/*.blockmap
            release/*.yml
            release/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 14
